  # source: app/controllers/post_votes_controller.rb
  /posts/{post_id}/votes.json:
    post:
      operationId: createPostVote
      x-access-level: member
      tags:
        - post_votes
      summary: Vote on a post
      description: Casts a vote on the specified post. Voting again with the same score will remove the vote unless no_unvote is set.
      parameters:
        - name: post_id
          in: path
          required: true
          description: The ID of the post to vote on
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - score
              properties:
                score:
                  type: integer
                  description: The vote score (1 for upvote, -1 for downvote)
                  enum: [1, -1]
                no_unvote:
                  type: boolean
                  description: If true, do not remove an existing identical vote
      responses:
        '200':
          description: Vote cast successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  score:
                    type: integer
                    description: The new total score of the post
                  up:
                    type: integer
                    description: The new upvote score of the post
                  down:
                    type: integer
                    description: The new downvote score of the post
                  our_score:
                    type: integer
                    description: The current user's vote score (0 if unvoted)
        '422':
          description: Validation error
    delete:
      operationId: deletePostVote
      x-access-level: member
      tags:
        - post_votes
      summary: Remove vote from a post
      description: Removes the current user's vote from the specified post.
      parameters:
        - name: post_id
          in: path
          required: true
          description: The ID of the post to remove the vote from
