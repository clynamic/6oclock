                    properties:
                      posts:
                        type: array
                        items:
                          $ref: '#/components/schemas/Post'
                  - type: array
                    items:
                      $ref: '#/components/schemas/PostV2Basic'
                  - type: array
                    items:
                      $ref: '#/components/schemas/PostV2Extended'
                  - type: array
                    items:
                      $ref: '#/components/schemas/PostV2Thumbnail'
