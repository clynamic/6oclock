          description: Filter by creator username (staff only)
          schema:
            type: string
        - name: search[accused_name]
          in: query
          required: false
          description: Filter by accused username (staff only)
          schema:
            type: string
        - name: search[accused_id]
          in: query
          required: false
          description: Filter by accused user ID (staff only)
          schema:
            type: integer
        - name: search[claimant_id]
          in: query
          required: false
          description: Filter by claimant ID (staff only)
          schema:
            type: integer
        - name: search[claimant_name]
          in: query
          required: false
          description: Filter by claimant username (staff only)
          schema:
            type: string
        - name: search[reason]
          in: query
          required: false
          description: Filter by reason text (staff only)
          schema:
            type: string
      responses:
