  # source: app/controllers/tickets_controller.rb
  /tickets/{id}.json:
    get:
      operationId: getTicket
      x-access-level: member
      tags:
        - tickets
      summary: Get a ticket by ID
      description: Returns detailed information about a specific ticket identified by its ID.
      parameters:
        - name: id
          in: path
          required: true
          description: The unique ID of the ticket to retrieve
          schema:
            type: integer
      responses:
        '200':
          description: Successful response containing ticket details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        '404':
          description: Ticket not found
        '500':
          description: Server error
    put:
      operationId: updateTicket
      x-access-level: moderator
      tags:
        - tickets
      summary: Update a ticket
      description: Updates a ticket's status and response. Automatically claims the ticket for the current user.
      parameters:
        - name: id
          in: path
          required: true
          description: The unique ID of the ticket
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ticket[response]:
                  type: string
                  description: The response to the ticket
                ticket[status]:
                  type: string
                  description: The new status of the ticket
                  enum: [pending, approved, partial]
                ticket[record_type]:
                  type: string
                  description: The type of record to apply if the ticket content is warnable
                ticket[send_update_dmail]:
                  type: boolean
                  description: Whether to send a DMail notification about the update
                force_claim:
                  type: boolean
                  description: Force claiming the ticket even if already claimed by another user
      responses:
        '200':
          description: The updated ticket
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        '422':
          description: Validation error
        '403':
          description: Access denied
