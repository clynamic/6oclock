openapi: 3.0.3
info:
  title: e621 API
  version: dadc1e4c50658851c0205e6ecbfa4723a976b0ab
  description: |
    An API for accessing user information and other resources on e621 and e926.

    ## Authentication

    Endpoints with `x-access-level` above `anonymous` require authentication.
    Credentials are the account username and an API key issued by `/api_keys.json`,
    submitted as either HTTP Basic (username, API key) or the query/body parameters
    `login` and `api_key`.

    The `x-access-level` extension declares the minimum privilege level for an
    operation: `anonymous`, `logged_in`, `member`, `janitor`, `moderator`, `admin`.
servers:
  - url: https://e621.net
    description: Production server for e621
  - url: https://e926.net
    description: SFW server for e926

security:
  - {}
  - BasicAuth: []
  - ApiKeyLogin: []
    ApiKeyQuery: []

paths:
  # source: app/controllers/posts_controller.rb
  /posts.json:
    get:
      operationId: getPosts
      x-access-level: anonymous
      tags:
        - posts
      summary: Get a list of posts
      description: |
        Returns a list of posts filtered by tags.

        When `v2=true`, the response uses the v2 Post format selected by `mode`
        (`basic` default, `extended`, or `thumbnail`). Otherwise the legacy
        format wrapped in `{ "posts": [...] }` is returned.
      parameters:
        - name: page
          in: query
          required: false
          description: The page number for pagination
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          description: The number of posts to retrieve per page
          schema:
            type: integer
        - name: tags
          in: query
          required: false
          description: Filter posts by tags
          schema:
            type: string
        - $ref: '#/components/parameters/PostV2Flag'
        - $ref: '#/components/parameters/PostV2Mode'
      responses:
        '200':
          description: A list of posts matching the search criteria
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: Legacy response (default, or when `v2` is not "true"). The post array is wrapped under `posts`.
                    properties:
                      posts:
                        type: array
                        items:
                          $ref: '#/components/schemas/Post'
                  - type: array
                    description: v2 basic format response (when `v2=true` and `mode` is unset or `basic`).
                    items:
                      $ref: '#/components/schemas/PostV2Basic'
                  - type: array
                    description: v2 extended format response (when `v2=true` and `mode=extended`).
                    items:
                      $ref: '#/components/schemas/PostV2Extended'
                  - type: array
                    description: v2 thumbnail format response (when `v2=true` and `mode=thumbnail`).
                    items:
                      $ref: '#/components/schemas/PostV2Thumbnail'
        '400':
          description: Invalid request parameters
        '500':
          description: Server error
  # source: app/controllers/posts_controller.rb
  /posts/{id}.json:
    get:
      operationId: getPost
      x-access-level: anonymous
      tags:
        - posts
      summary: Get a post by ID
      description: |
        Returns detailed information about a specific post identified by its ID.

        When `v2=true`, the response uses the v2 Post format selected by `mode`
        (`basic` default, `extended`, or `thumbnail`). Otherwise the legacy
        format wrapped in `{ "post": {...} }` is returned.
      parameters:
        - name: id
          in: path
          required: true
          description: The unique ID of the post to retrieve
          schema:
            type: integer
        - $ref: '#/components/parameters/PostV2Flag'
        - $ref: '#/components/parameters/PostV2Mode'
      responses:
        '200':
          description: Successful response containing post details
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: Legacy response (default, or when `v2` is not "true"). The post is wrapped under `post`.
                    properties:
                      post:
                        $ref: '#/components/schemas/Post'
                  - $ref: '#/components/schemas/PostV2Basic'
                  - $ref: '#/components/schemas/PostV2Extended'
                  - $ref: '#/components/schemas/PostV2Thumbnail'
        '404':
          description: Post not found
        '500':
          description: Server error
  # source: app/controllers/users_controller.rb
  /users.json:
    get:
      operationId: getUsers
      x-access-level: anonymous
      tags:
        - users
      summary: Get a list of users
      description: Returns a list of users based on search criteria.
      parameters:
        - name: page
          in: query
          required: false
          description: The page number to retrieve
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          description: The number of users to retrieve per page
          schema:
            type: integer
        - name: search[id]
          in: query
          required: false
          description: Filter by user ID
          schema:
            type: string
        - name: search[name]
          in: query
          required: false
          description: Filter by username
          schema:
            type: string
        - name: search[about]
          in: query
          required: false
          description: Filter by user's "About" section
          schema:
            type: string
        - name: search[avatar_id]
          in: query
          required: false
          description: Filter by avatar ID
          schema:
            type: integer
        - name: search[level]
          in: query
          required: false
          description: Filter by user's access level
          schema:
            type: integer
        - name: search[min_level]
          in: query
          required: false
          description: Filter by minimum access level
          schema:
            type: integer
        - name: search[max_level]
          in: query
          required: false
          description: Filter by maximum access level
          schema:
            type: integer
        - name: search[can_upload_free]
          in: query
          required: false
          description: Filter by upload permissions
          schema:
            type: boolean
        - name: search[can_approve_posts]
          in: query
          required: false
          description: Filter by post approval permissions
          schema:
            type: boolean
        - name: search[order]
          in: query
          required: false
          description: Order the results by a specific field
          schema:
            type: string
            enum: [date, name, post_upload_count, note_count, post_update_count]
      responses:
        '200':
          description: A list of users matching the search criteria
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '400':
          description: Invalid request parameters
        '500':
          description: Server error
    post:
      operationId: createUser
      x-access-level: anonymous
      tags:
        - users
      summary: Create a new user account
      description: Registers a new user account. Only available when not logged in and signups are enabled.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user
              properties:
                user:
                  type: object
                  required:
                    - name
                    - email
                    - password
                    - password_confirmation
                  properties:
                    name:
                      type: string
                      description: The desired username
                    email:
                      type: string
                      description: The user's email address
                    password:
                      type: string
                      description: The password for the account
                    password_confirmation:
                      type: string
                      description: Password confirmation
      responses:
        '201':
          description: User account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '422':
          description: Validation error
  # source: app/controllers/users_controller.rb
  /users/{id}.json:
    get:
      operationId: getUser
      x-access-level: anonymous
      tags:
        - users
      summary: Get user information by ID or username
      description: Returns detailed information about a user identified by their ID or username.
      parameters:
        - name: id
          in: path
          required: true
          description: The ID or username of the user to retrieve
          schema:
            type: string
            description: Can be either the user's ID (integer) or username (string)
      responses:
        '200':
          description: Successful response containing user details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '404':
          description: User not found
        '500':
          description: Server error
    patch:
      operationId: updateUser
      x-access-level: logged_in
      tags:
        - users
      summary: Update the current user's settings
      description: Updates the currently authenticated user's account settings. Users can only update their own account unless they are an admin.
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the user to update (must be the current user unless admin)
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user
              properties:
                user:
                  type: object
                  properties:
                    comment_threshold:
                      type: integer
                      description: Score threshold below which comments are hidden
                    default_image_size:
                      type: string
                      description: Default image display size
                    favorite_tags:
                      type: string
                      description: User's favorite tags
                    blacklisted_tags:
                      type: string
                      description: Tags to blacklist
                    time_zone:
                      type: string
                      description: User's time zone
                    per_page:
                      type: integer
                      description: Number of items per page
                    custom_style:
                      type: string
                      description: Custom CSS style
                    description_collapsed_initially:
                      type: boolean
                      description: Whether post descriptions are collapsed by default
                    hide_comments:
                      type: boolean
                      description: Whether to hide comments by default
                    receive_email_notifications:
                      type: boolean
                      description: Whether to receive email notifications
                    enable_keyboard_navigation:
                      type: boolean
                      description: Whether keyboard navigation is enabled
                    enable_privacy_mode:
                      type: boolean
                      description: Whether privacy mode is enabled
                    disable_user_dmails:
                      type: boolean
                      description: Whether to disable user DMails
                    blacklist_users:
                      type: boolean
                      description: Whether to blacklist users
                    show_post_statistics:
                      type: boolean
                      description: Whether to show post statistics
                    style_usernames:
                      type: boolean
                      description: Whether to style usernames by level
                    show_hidden_comments:
                      type: boolean
                      description: Whether to show hidden comments
                    enable_auto_complete:
                      type: boolean
                      description: Whether auto-complete is enabled
                    enable_safe_mode:
                      type: boolean
                      description: Whether safe mode is enabled
                    disable_responsive_mode:
                      type: boolean
                      description: Whether responsive mode is disabled
                    profile_about:
                      type: string
                      description: User's about me text
                    profile_artinfo:
                      type: string
                      description: User's artist info text
                    avatar_id:
                      type: integer
                      description: Post ID to use as avatar
                    password:
                      type: string
                      description: New password
                    old_password:
                      type: string
                      description: Current password (required when changing password)
                    password_confirmation:
                      type: string
                      description: New password confirmation
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '403':
          description: Access denied
        '422':
          description: Validation error
