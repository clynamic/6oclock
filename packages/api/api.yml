        - name: page
          in: query
          required: false
          description: The page number for pagination
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          description: The number of posts to retrieve per page
          schema:
            type: integer
        - $ref: '#/components/parameters/PostV2Flag'
        - $ref: '#/components/parameters/PostV2Mode'
      responses:
        '200':
          description: A list of favorited posts
          content:
            application/json:
