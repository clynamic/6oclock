        status:
          type: string
          enum: [pending, partial, approved]
          description: The current status of the appeal
        reason:
          type: string
          description: The reason given for the appeal
        response:
          type: string
          description: The handler's response to the appeal
        claimant_id:
          type: integer
          nullable: true
          description: The ID of the staff member currently claiming the appeal
        handler_id:
          type: integer
          nullable: true
          description: The ID of the staff member who last updated the appeal
        accused_id:
          type: integer
          nullable: true
          description: The ID of the user the appeal is filed against (e.g. the flag creator for flag appeals)
        created_at:
          type: string
          format: date-time
          description: The time the appeal was created
        updated_at:
          type: string
          format: date-time
          description: The last time the appeal was updated
