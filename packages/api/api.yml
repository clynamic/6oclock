    post:
      operationId: createAppeal
      x-access-level: member
      tags:
        - appeals
      summary: Create an appeal
      description: Creates a new appeal. For `qtype=flag`, only the uploader of the flagged post may create the appeal.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - appeal
              properties:
                appeal:
                  type: object
                  required:
                    - qtype
                    - disp_id
                    - reason
                  properties:
                    qtype:
                      type: string
                      description: The kind of appeal
                      enum: [flag]
                    disp_id:
                      type: integer
                      description: The ID of the appealed record (e.g. a PostFlag ID for `qtype=flag`)
                    reason:
                      type: string
                      description: The reason for the appeal
      responses:
        '302':
          description: Redirects to the created appeal on success
        '403':
          description: Access denied
        '422':
          description: Validation error
