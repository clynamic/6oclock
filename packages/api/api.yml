  # source: app/controllers/post_events_controller.rb
  /post_events.json:
    get:
      operationId: getPostEvents
      x-access-level: anonymous
      tags:
        - post_events
      summary: Get a list of post events
      description: |
        Returns a list of post events filtered by various criteria.

        When `v2=true`, the response is an unwrapped array. Otherwise the array is
        wrapped under `post_events`.
      parameters:
        - name: page
          in: query
          required: false
          description: The page number to retrieve
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          description: The number of post events to retrieve per page
          schema:
            type: integer
        - name: search[post_id]
          in: query
          required: false
          description: Filter by post ID
          schema:
            type: integer
        - name: search[creator_name]
          in: query
          required: false
          description: Filter by the creator's username
          schema:
            type: string
        - name: search[creator_id]
          in: query
          required: false
          description: Filter by the creator's ID
          schema:
            type: integer
        - name: search[action]
          in: query
          required: false
          description: Filter by the action performed
          schema:
            type: string
            enum:
              - deleted
              - undeleted
              - approved
              - unapproved
              - flag_created
              - flag_removed
              - favorites_moved
              - favorites_received
              - rating_locked
              - rating_unlocked
              - status_locked
              - status_unlocked
              - note_locked
              - note_unlocked
              - comment_locked
              - comment_unlocked
              - comment_disabled
              - comment_enabled
              - replacement_accepted
              - replacement_rejected
              - replacement_promoted
              - replacement_deleted
              - expunged
              - changed_bg_color
              - replacement_penalty_changed
        - name: search[created_at]
          in: query
          required: false
          description: Filter by the creation date of the event
          schema:
            type: string
        - name: search[id]
          in: query
          required: false
          description: Filter by event ID
          schema:
            type: string
        - $ref: '#/components/parameters/PostV2Flag'
      responses:
        '200':
          description: A list of post events matching the search criteria
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: Legacy response (default). The array is wrapped under `post_events`.
                    properties:
                      post_events:
                        type: array
                        items:
                          $ref: '#/components/schemas/PostEvent'
                  - type: array
                    description: Unwrapped response (when `v2=true`).
                    items:
                      $ref: '#/components/schemas/PostEvent'
        '400':
          description: Invalid request parameters
        '500':
          description: Server error
