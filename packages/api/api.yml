          nullable: true
    PostV2Stats:
      type: object
      properties:
        score:
          type: object
          properties:
            up:
              type: integer
            down:
              type: integer
            total:
              type: integer
        fav_count:
          type: integer
        is_favorited:
          type: boolean
        comment_count:
          type: integer
    PostV2Flags:
      type: object
      properties:
        pending:
          type: boolean
        flagged:
          type: boolean
        note_locked:
          type: boolean
        status_locked:
          type: boolean
        rating_locked:
          type: boolean
        deleted:
          type: boolean
    PostV2Has:
      type: object
      properties:
        parent:
          type: boolean
        children:
          type: boolean
        active_children:
          type: boolean
        notes:
          type: boolean
        sample:
          type: boolean
    PostV2Relationships:
      type: object
      properties:
        parent_id:
          type: integer
          nullable: true
        children:
          type: array
          items:
            type: integer
    PostV2Base:
      type: object
      description: Common fields shared by the v2 basic and extended Post formats.
      properties:
        id:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        change_seq:
          type: integer
        files:
          $ref: '#/components/schemas/PostV2Files'
        uploader_id:
          type: integer
        uploader_name:
          type: string
        approver_id:
          type: integer
          nullable: true
        stats:
          $ref: '#/components/schemas/PostV2Stats'
        flags:
          $ref: '#/components/schemas/PostV2Flags'
        has:
          $ref: '#/components/schemas/PostV2Has'
        relationships:
          $ref: '#/components/schemas/PostV2Relationships'
        pools:
          type: array
          items:
            type: integer
        rating:
          type: string
          enum: [s, q, e]
        locked_tags:
          type: array
          items:
            type: string
        sources:
          type: array
          items:
            type: string
        description:
          type: string
    PostV2Basic:
      description: Basic v2 Post payload (`v2=true`, `mode` unset or `basic`). Tags are a flat array of strings.
      allOf:
        - $ref: '#/components/schemas/PostV2Base'
        - type: object
          properties:
            tags:
              type: array
              items:
                type: string
              description: All tags on the post.
    PostV2Extended:
      description: Extended v2 Post payload (`v2=true`, `mode=extended`). Tags are grouped by category name.
      allOf:
        - $ref: '#/components/schemas/PostV2Base'
        - type: object
          properties:
            tags:
              type: object
              description: Tags keyed by category name (`general`, `species`, `character`, `copyright`, `artist`, `invalid`, `lore`, `meta`).
              additionalProperties:
                type: array
                items:
                  type: string
    PostV2Thumbnail:
      type: object
      description: Compact thumbnail v2 Post payload (`v2=true`, `mode=thumbnail` or `thumbnails`).
      properties:
        id:
          type: integer
        created_at:
          type: string
          format: date-time
        md5:
          type: string
        file_ext:
          type: string
        width:
          type: integer
        height:
          type: integer
        size:
          type: integer
        preview_url:
          type: string
          nullable: true
        preview_webp:
          type: string
          nullable: true
        sample_url:
          type: string
          nullable: true
        file_url:
          type: string
          nullable: true
        preview_width:
          type: integer
        preview_height:
          type: integer
        uploader_id:
          type: integer
        uploader:
          type: string
        score:
          type: integer
        fav_count:
          type: integer
        is_favorited:
          type: boolean
        comment_count:
          type: integer
        flags:
          type: string
          description: Space-separated subset of "pending", "flagged", and "deleted".
        pools:
          type: string
          description: Space-separated list of pool IDs.
        rating:
          type: string
          enum: [s, q, e]
        tags:
          type: string
          description: Space-separated tag string.
    IqdbQuery:
      type: object
      description: An IQDB similarity match result. The shape of `post` depends on the request's `v2` parameter.
      properties:
        post_id:
          type: integer
          description: The ID of the matching post
        score:
          type: number
          description: The similarity score
        post:
          oneOf:
            - $ref: '#/components/schemas/Post'
            - $ref: '#/components/schemas/PostV2Basic'
          description: Basic v2 Post format when `v2=true`, legacy Post format otherwise.
