            enum: [pending, rejected, approved, promoted]
        - name: search[created_at]
          in: query
          required: false
          description: Filter replacements by creation date
          schema:
            type: string
        - name: search[updated_at]
          in: query
          required: false
          description: Filter replacements by last update date
          schema:
            type: string
        - name: search[id]
          in: query
          required: false
          description: Filter replacements by replacement ID
          schema:
            type: string
      responses:
        '200':
          description: A list of post replacements matching the search criteria
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PostReplacement'
        '400':
          description: Invalid request parameters
        '500':
          description: Server error
    post:
      operationId: createPostReplacement
      x-access-level: member
      tags:
        - post_replacements
      summary: Create a post replacement
      description: Creates a new post replacement for a given post.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - post_id
              properties:
                post_id:
                  type: integer
                  description: The ID of the post to replace
                post_replacement[replacement_url]:
                  type: string
                  description: URL of the replacement file
                post_replacement[replacement_file]:
                  type: string
                  format: binary
                  description: The replacement file to upload
                post_replacement[reason]:
                  type: string
                  description: Reason for the replacement
                post_replacement[source]:
                  type: string
                  description: Source URL for the replacement
                post_replacement[as_pending]:
                  type: boolean
                  description: Whether to upload as pending
      responses:
        '200':
          description: The created post replacement
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  location:
                    type: string
                  message:
                    type: string
        '412':
          description: Replacement validation failed
        '403':
          description: Access denied
