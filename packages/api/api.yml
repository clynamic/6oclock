  # source: app/controllers/dmails_controller.rb
  /dmails.json:
    get:
      operationId: getDmails
      x-access-level: member
      tags:
        - dmails
      summary: Get a list of DMails
      description: Returns a list of DMails for the currently authenticated user.
      parameters:
        - name: page
          in: query
          required: false
          description: The page number to retrieve
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          description: The number of DMails to retrieve per page
          schema:
            type: integer
        - name: search[title_matches]
          in: query
          required: false
          description: Filter by title text
          schema:
            type: string
        - name: search[message_matches]
          in: query
          required: false
          description: Filter by message body text
          schema:
            type: string
        - name: search[to_name]
          in: query
          required: false
          description: Filter by recipient username
          schema:
            type: string
        - name: search[to_id]
          in: query
          required: false
          description: Filter by recipient user ID
          schema:
            type: integer
        - name: search[from_name]
          in: query
          required: false
          description: Filter by sender username
          schema:
            type: string
        - name: search[from_id]
          in: query
          required: false
          description: Filter by sender user ID
          schema:
            type: integer
        - name: search[is_read]
          in: query
          required: false
