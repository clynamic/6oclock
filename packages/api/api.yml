components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
      description: HTTP Basic with the account username and an API key from `/api_keys.json`. The account password is not accepted.
    ApiKeyLogin:
      type: apiKey
      in: query
      name: login
      description: Account username. Must be sent together with `api_key`.
    ApiKeyQuery:
      type: apiKey
      in: query
      name: api_key
      description: API key from `/api_keys.json`. Must be sent together with `login`.
  parameters:
    PostV2Flag:
      name: v2
      in: query
      required: false
      description: If `"true"`, the response uses the v2 Post format. Otherwise the legacy format is returned.
      schema:
        type: string
        enum: ["true"]
    PostV2Mode:
      name: mode
      in: query
      required: false
      description: Selects the v2 Post payload shape. Only effective when `v2=true`. Default `basic`.
      schema:
        type: string
        enum: [basic, extended, thumbnail, thumbnails]
  schemas:
    Post:
      type: object
      required:
        - id
        - created_at
        - updated_at
        - file
        - preview
        - sample
        - score
        - tags
        - locked_tags
        - change_seq
        - flags
        - rating
        - fav_count
        - sources
        - pools
        - relationships
        - uploader_id
        - description
        - comment_count
        - has_notes
      properties:
        id:
          type: integer
          description: The unique ID of the post
        created_at:
          type: string
          format: date-time
          description: The time when the post was created
        updated_at:
          type: string
          format: date-time
          description: The last time the post was updated
        file:
          $ref: '#/components/schemas/File'
        preview:
          $ref: '#/components/schemas/Preview'
        sample:
          $ref: '#/components/schemas/Sample'
        score:
          $ref: '#/components/schemas/Score'
        tags:
          $ref: '#/components/schemas/Tags'
        locked_tags:
          type: array
          items:
            type: string
          description: An array of tags that are locked
        change_seq:
          type: integer
          description: The sequence number of changes to the post
        flags:
          $ref: '#/components/schemas/Flags'
        rating:
          type: string
          description: The rating of the post (e.g., safe, questionable, explicit)
          enum: [s, q, e]
        fav_count:
          type: integer
          description: The number of times the post has been favorited
        sources:
          type: array
          items:
            type: string
          description: An array of sources for the post
        pools:
          type: array
          items:
            type: integer
          description: An array of pool IDs associated with the post
        relationships:
          $ref: '#/components/schemas/Relationships'
        approver_id:
          type: integer
          nullable: true
          description: The ID of the user who approved the post, if applicable
        uploader_id:
          type: integer
          description: The ID of the user who uploaded the post
        uploader_name:
          type: string
          description: The username of the user who uploaded the post
        description:
          type: string
          description: The description of the post
        comment_count:
          type: integer
          description: The number of comments on the post
        is_favorited:
          type: boolean
          description: Whether the post is favorited by the current user
        has_notes:
          type: boolean
          description: Whether the post has any notes attached
        duration:
          type: number
          nullable: true
          description: The duration of the post, if applicable

    File:
      type: object
      required:
        - width
        - height
        - ext
        - size
        - md5
        - url
      properties:
        width:
          type: integer
          description: The width of the file in pixels
        height:
          type: integer
          description: The height of the file in pixels
        ext:
          type: string
          description: The file extension (e.g., jpg, png, webm)
          enum: [jpg, png, gif, webm, mp4, swf, apng]
        size:
          type: integer
          description: The size of the file in bytes
        md5:
          type: string
          description: The MD5 hash of the file
        url:
          type: string
          description: The URL of the file

    Preview:
      type: object
      required:
        - width
        - height
        - url
      properties:
        width:
          type: integer
          description: The width of the preview in pixels
        height:
          type: integer
          description: The height of the preview in pixels
        url:
          type: string
          description: The URL of the preview image
        alt:
          type: string
          nullable: true
          description: The URL of the WebP preview image

    Sample:
      type: object
      required:
        - has
        - height
        - width
        - url
      properties:
        has:
          type: boolean
          description: Whether the sample exists
        height:
          type: integer
          description: The height of the sample image in pixels
        width:
          type: integer
          description: The width of the sample image in pixels
        url:
          type: string
          description: The URL of the sample image
        alt:
          type: string
          nullable: true
          description: The URL of the WebP sample image
        alternates:
          type: object
          description: Alternate versions of the sample for video posts
          properties:
            has:
              type: boolean
              description: Whether alternate versions exist
            original:
              type: object
              description: The original video version
              properties:
                codec:
                  type: string
                  nullable: true
                fps:
                  type: integer
                size:
                  type: integer
                width:
                  type: integer
                height:
                  type: integer
                url:
                  type: string
                  nullable: true
            variants:
              type: object
              description: Transcoded video variants keyed by name
              additionalProperties:
                type: object
                properties:
                  codec:
                    type: string
                  url:
                    type: string
                    nullable: true
                  width:
                    type: integer
                  height:
                    type: integer
            samples:
              type: object
              description: Sample versions keyed by name
              additionalProperties:
                type: object
                properties:
                  url:
                    type: string
                    nullable: true
                  width:
                    type: integer
                  height:
                    type: integer

    Score:
      type: object
      required:
        - up
        - down
        - total
      properties:
        up:
          type: integer
          description: The number of upvotes on the post
        down:
          type: integer
          description: The number of downvotes on the post
        total:
          type: integer
          description: The total score (upvotes minus downvotes)

    Tags:
      type: object
      required:
        - general
        - artist
        - contributor
        - copyright
        - character
        - species
        - invalid
        - meta
        - lore
      properties:
        general:
          type: array
          items:
            type: string
          description: An array of general tags
        artist:
          type: array
          items:
            type: string
          description: An array of artist tags
        contributor:
          type: array
          items:
            type: string
          description: An array of contributor tags
        copyright:
          type: array
          items:
            type: string
          description: An array of copyright tags
        character:
          type: array
          items:
            type: string
          description: An array of character tags
        species:
          type: array
          items:
            type: string
          description: An array of species tags
        invalid:
          type: array
          items:
            type: string
          description: An array of invalid tags
        meta:
          type: array
          items:
            type: string
          description: An array of meta tags
        lore:
          type: array
          items:
            type: string
          description: An array of lore tags

    Flags:
      type: object
      required:
        - pending
        - flagged
        - note_locked
        - status_locked
        - rating_locked
        - deleted
      properties:
        pending:
          type: boolean
          description: Whether the post is pending approval
        flagged:
          type: boolean
          description: Whether the post is flagged
        note_locked:
          type: boolean
          description: Whether notes on the post are locked
        status_locked:
          type: boolean
          description: Whether the status of the post is locked
        rating_locked:
          type: boolean
          description: Whether the rating of the post is locked
        deleted:
          type: boolean
          description: Whether the post is deleted

    Relationships:
      type: object
      required:
        - has_children
        - has_active_children
        - children
      properties:
        parent_id:
          type: integer
          nullable: true
          description: The ID of the parent post, if applicable
        has_children:
          type: boolean
          description: Whether the post has any child posts
        has_active_children:
          type: boolean
          description: Whether the post has any active child posts
        children:
          type: array
          items:
            type: integer
          description: An array of child post IDs
    UserProfile:
      type: object
      description: A detailed representation of a user.
      required:
        - id
        - name
        - created_at
        - level
        - base_upload_limit
        - post_upload_count
        - post_update_count
        - note_update_count
        - is_banned
        - can_approve_posts
        - can_upload_free
        - level_string
      properties:
        wiki_page_version_count:
          type: integer
          description: Number of wiki page versions created by the user
        artist_version_count:
          type: integer
          description: Number of artist versions created by the user
        pool_version_count:
          type: integer
          description: Number of pool versions created by the user
        forum_post_count:
          type: integer
          description: Number of forum posts created by the user
        comment_count:
          type: integer
          description: Number of comments made by the user
        flag_count:
          type: integer
          description: Number of flags made by the user
        favorite_count:
          type: integer
          description: Number of favorites added by the user
        positive_feedback_count:
          type: integer
          description: Number of positive feedbacks received by the user
        neutral_feedback_count:
          type: integer
          description: Number of neutral feedbacks received by the user
        negative_feedback_count:
          type: integer
          description: Number of negative feedbacks received by the user
        upload_limit:
          type: integer
          description: The user's current upload limit
        profile_about:
          type: string
          description: The user's "About" profile section
        profile_artinfo:
          type: string
          description: The user's art information profile section
        id:
          type: integer
          description: The unique ID of the user
        created_at:
          type: string
          format: date-time
          description: The timestamp when the user account was created
        name:
          type: string
          description: The username of the user
        level:
          type: integer
          description: The user's access level (numerical)
        base_upload_limit:
          type: integer
          description: The base upload limit for the user
        post_upload_count:
          type: integer
          description: Number of posts uploaded by the user
        post_update_count:
          type: integer
          description: Number of post updates made by the user
        note_update_count:
          type: integer
          description: Number of note updates made by the user
        is_banned:
          type: boolean
          description: Whether the user is banned
        can_approve_posts:
          type: boolean
          description: Whether the user can approve posts
        can_upload_free:
          type: boolean
          description: Whether the user can upload without restrictions
        level_string:
          type: string
          description: The user's access level (textual description)
        avatar_id:
          type: integer
          description: The ID of the user's avatar image
        is_verified:
          type: boolean
          description: Whether the user has verified their email
    User:
      type: object
      description: A simplified representation of a user with core attributes.
      required:
        - id
        - created_at
        - name
        - level
        - base_upload_limit
        - post_upload_count
        - post_update_count
        - note_update_count
        - is_banned
        - can_approve_posts
        - can_upload_free
        - level_string
      properties:
        id:
          type: integer
          description: The unique ID of the user
        created_at:
          type: string
          format: date-time
          description: The timestamp when the user account was created
        name:
          type: string
          description: The username of the user
        level:
          type: integer
          description: The user's access level (numerical)
        base_upload_limit:
          type: integer
          description: The base upload limit for the user
        post_upload_count:
          type: integer
          description: Number of posts uploaded by the user
        post_update_count:
          type: integer
          description: Number of post updates made by the user
        note_update_count:
          type: integer
          description: Number of note updates made by the user
        is_banned:
          type: boolean
          description: Whether the user is banned
        can_approve_posts:
          type: boolean
          description: Whether the user can approve posts
        can_upload_free:
          type: boolean
          description: Whether the user can upload without restrictions
        level_string:
          type: string
          description: The user's access level (textual description)
        avatar_id:
          type: integer
