          description: Access denied
  # source: app/controllers/dmails_controller.rb
  /dmails/{id}.json:
    get:
      operationId: getDmail
      x-access-level: member
      tags:
        - dmails
      summary: Get a DMail by ID
      description: Returns a specific DMail. Only visible to the owner, or moderators for system/ticketed DMails.
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the DMail
          schema:
            type: integer
      responses:
        '200':
          description: DMail details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dmail'
        '403':
          description: Access denied
        '404':
          description: DMail not found
    delete:
      operationId: deleteDmail
      x-access-level: member
      tags:
        - dmails
      summary: Delete a DMail
      description: Marks a DMail as deleted and read.
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the DMail
          schema:
            type: integer
      responses:
        '200':
          description: DMail deleted
        '403':
          description: Access denied
        '404':
          description: DMail not found
  # source: app/controllers/dmails_controller.rb
  /dmails/{id}/mark_as_read.json:
    put:
      operationId: markDmailAsRead
      x-access-level: member
      tags:
        - dmails
      summary: Mark a DMail as read
      description: Marks a specific DMail as read and decrements the unread count.
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the DMail
          schema:
            type: integer
      responses:
        '200':
          description: DMail marked as read
        '403':
          description: Access denied
        '404':
          description: DMail not found
  # source: app/controllers/dmails_controller.rb
  /dmails/{id}/mark_as_unread.json:
    put:
      operationId: markDmailAsUnread
      x-access-level: member
      tags:
        - dmails
      summary: Mark a DMail as unread
      description: Marks a specific DMail as unread and increments the unread count.
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the DMail
          schema:
            type: integer
      responses:
        '200':
          description: DMail marked as unread
        '403':
          description: Access denied
        '404':
          description: DMail not found
  # source: app/controllers/dmails_controller.rb
  /dmails/mark_all_as_read.json:
    put:
      operationId: markAllDmailsAsRead
      x-access-level: member
      tags:
        - dmails
      summary: Mark all DMails as read
      description: Marks all of the current user's unread DMails as read and resets the unread count.
      responses:
        '200':
          description: All DMails marked as read
        '403':
          description: Access denied
  # source: app/controllers/api_keys_controller.rb
  /api_keys.json:
    get:
      operationId: getApiKeys
      x-access-level: member
      tags:
        - api_keys
      summary: Get a list of API keys
      description: Returns a list of the current user's API keys. Requires reauthentication.
      parameters:
        - name: page
          in: query
          required: false
          description: The page number to retrieve
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          description: The number of API keys to retrieve per page
          schema:
            type: integer
        - name: search[name_matches]
          in: query
          required: false
          description: Filter by key name
          schema:
            type: string
        - name: search[is_expired]
          in: query
          required: false
          description: Filter by expired status
          schema:
            type: boolean
        - name: search[order]
          in: query
          required: false
          description: Sort order
          schema:
            type: string
      responses:
        '200':
          description: A list of API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiKey'
        '403':
          description: Access denied
    post:
      operationId: createApiKey
      x-access-level: member
      tags:
        - api_keys
      summary: Create a new API key
      description: Creates a new API key for the current user. Requires reauthentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - api_key
              properties:
                api_key:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      description: A name for the API key
                    expires_at:
                      type: string
                      format: date-time
                      description: When the API key should expire
                    duration:
                      type: string
                      description: Duration preset (e.g. "30", "90", "never", "custom")
      responses:
        '201':
          description: API key created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '422':
          description: Validation error
  # source: app/controllers/api_keys_controller.rb
  /api_keys/{id}.json:
    delete:
      operationId: deleteApiKey
      x-access-level: member
      tags:
        - api_keys
      summary: Delete an API key
      description: Permanently deletes an API key. Requires reauthentication.
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the API key
          schema:
            type: integer
      responses:
        '200':
          description: API key deleted
        '404':
          description: API key not found
  # source: app/controllers/api_keys_controller.rb
  /api_keys/{id}/regenerate.json:
    post:
      operationId: regenerateApiKey
      x-access-level: member
      tags:
        - api_keys
      summary: Regenerate an expired API key
      description: Regenerates an expired API key with a new token and expiration. Only expired keys can be regenerated.
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the API key
          schema:
            type: integer
      responses:
        '200':
          description: API key regenerated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '422':
          description: API key is not expired
