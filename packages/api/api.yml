  /iqdb_queries.json:
    get:
      operationId: getIqdbQuery
      x-access-level: anonymous
      tags:
        - iqdb
      summary: Search for similar images (GET)
      description: Queries the IQDB service for visually similar images using a post ID, URL, or hash.
      parameters:
        - name: search[post_id]
          in: query
          required: false
          description: Find images similar to this post
          schema:
            type: integer
        - name: search[url]
          in: query
          required: false
          description: Find images similar to the image at this URL
          schema:
            type: string
        - name: search[hash]
          in: query
          required: false
          description: Find images similar to this perceptual hash
          schema:
            type: string
        - name: search[score_cutoff]
          in: query
          required: false
          description: Minimum similarity score threshold
          schema:
            type: number
        - name: v2
          in: query
          required: false
          description: If `"true"`, the `post` field uses the basic v2 Post format instead of the legacy serialization.
          schema:
            type: string
            enum: ["true"]
      responses:
        '200':
          description: A list of similar image matches
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      $ref: '#/components/schemas/IqdbQuery'
        '404':
          description: File not found or too large
        '500':
          description: IQDB service error
    post:
      operationId: postIqdbQuery
      x-access-level: anonymous
      tags:
        - iqdb
      summary: Search for similar images (POST)
      description: Queries the IQDB service for visually similar images. Supports file upload in addition to URL and post ID.
      parameters:
        - name: v2
          in: query
          required: false
          description: If `"true"`, the `post` field uses the basic v2 Post format instead of the legacy serialization.
          schema:
            type: string
            enum: ["true"]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                search[file]:
                  type: string
                  format: binary
                  description: An image file to find similar images for
                search[url]:
                  type: string
                  description: Find images similar to the image at this URL
                search[post_id]:
                  type: integer
                  description: Find images similar to this post
                search[hash]:
                  type: string
                  description: Find images similar to this perceptual hash
                search[score_cutoff]:
                  type: number
                  description: Minimum similarity score threshold
      responses:
        '200':
          description: A list of similar image matches
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      $ref: '#/components/schemas/IqdbQuery'
        '404':
          description: File not found or too large
        '500':
          description: IQDB service error
