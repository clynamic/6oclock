name: Lint and Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint API
        run: yarn workspace @6oclock/api lint --max-warnings 0

      - name: Lint Web
        run: yarn workspace @6oclock/web lint --max-warnings 0

      - name: Build API
        run: yarn build:api

      - name: Build Web
        run: yarn build:web
