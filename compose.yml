services:
  six-oclock:
    build: .
    container_name: six-oclock
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 34571
      DB_HOST: six-oclock-postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: six_oclock
      REDIS_HOST: six-oclock-redis
      DATA_DIR: /data
      NODE_ENV: production
    ports:
      - "34571:34571"
    volumes:
      - ./data:/data
    depends_on:
      - six-oclock-postgres
      - six-oclock-redis
    networks:
      - default

  six-oclock-postgres:
    image: postgres:latest
    container_name: six-oclock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: six_oclock
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - default

  six-oclock-redis:
    image: redis:7-alpine
    container_name: six-oclock-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - default

volumes:
  postgres-data:
  redis-data:

networks:
  default:
